[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "py-rizmi"
version = "1.0.0"
requires-python = ">=3.10"
dependencies = [
    "pyjwt>=2.8.0",
    "cryptography>=41.0.0",
    "customtkinter>=6.0.0",
    "ctkmessagebox>=2.7",
    "tkcalendar>=1.6.1",
]

[project.optional-dependencies]
dev = ["pytest>=7.4.0"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
