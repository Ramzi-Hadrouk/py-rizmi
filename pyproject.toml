[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "license-tool"
version = "1.0.0"
requires-python = ">=3.10"
dependencies = ["pyjwt>=2.8.0", "cryptography>=41.0.0"]

[project.optional-dependencies]
dev = ["pytest>=7.4.0"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
