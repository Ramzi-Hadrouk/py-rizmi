name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --extra dev --extra gui
      - run: uv run ruff check .
      - run: uv run mypy src

  fast-tests:
    name: Fast Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --extra dev --extra gui
      - run: sudo apt-get update && sudo apt-get install -y libegl1-mesa
      - run: uv run pytest -p no:qt tests/unit tests/test_hwid.py tests/test_keypair.py tests/test_license_issuer.py tests/test_license_validator.py -v --tb=short
      - run: uv run python -c "from py_rizmi import LicenseValidator; print('import ok')"

  full-tests:
    name: Full Suite (incl. GUI)
    runs-on: ubuntu-latest
    needs: [lint, fast-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --extra dev --extra gui
      - run: sudo apt-get update && sudo apt-get install -y libegl1-mesa
      - name: Run full test suite
        env:
          QT_QPA_PLATFORM: offscreen
        run: uv run pytest -v --tb=short
