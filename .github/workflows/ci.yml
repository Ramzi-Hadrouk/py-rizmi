name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --extra dev --extra gui
      - run: uv run ruff check .
      - run: uv run mypy src

  fast-tests:
    name: Fast Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --extra dev --extra gui
      - run: sudo apt-get update && sudo apt-get install -y libegl1
      - run: uv run pytest tests/unit -m "not slow" -v --tb=short --cov=src/py_rizmi/core --cov=src/py_rizmi/models --cov-fail-under=90

  slow-tests:
    name: Slow Tests (Integration & GUI)
    runs-on: ubuntu-latest
    needs: [lint, fast-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --extra dev --extra gui
      - run: sudo apt-get update && sudo apt-get install -y libegl1
      - name: Run full test suite
        env:
          QT_QPA_PLATFORM: offscreen
        run: uv run pytest tests/integration tests/contract tests/gui tests/e2e tests/regression -v --tb=short -n auto
